<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Local Community Event Portal</h1>

    <div class="eventCard">

        <h2>Technology Workshop</h2>

        <p>
            Learn HTML, CSS, JavaScript, Bootstrap, and modern web
            development techniques.
        </p>

    </div>

    <br>

    <input type="text" placeholder="Enter your name">

    <br><br>

    <div class="hiddenBox">
        This box uses <strong>visibility: hidden</strong>.
    </div>

    <div class="noneBox">
        This box uses <strong>display: none</strong>.
    </div>

</body>

</html>
