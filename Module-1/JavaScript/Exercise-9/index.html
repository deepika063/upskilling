<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Form Validation</title>
</head>

<body>

    <h2>Event Registration</h2>

    <form onsubmit="return validateForm()">

        <input
            type="text"
            id="name"
            placeholder="Enter Name">

        <br><br>

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <br><br>

        <button type="submit">
            Submit
        </button>

    </form>

    <script src="main.js"></script>

</body>

</html>
